services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-heroes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-heroespassword}
      POSTGRES_DB: ${POSTGRES_DB:-heroesdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"          # expose locally for DB tools (optional)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-heroes} -d ${POSTGRES_DB:-heroesdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-heroes}:${POSTGRES_PASSWORD:-heroespassword}@db:5432/${POSTGRES_DB:-heroesdb}
    depends_on:
      db:
        condition: service_healthy   # wait for Postgres to be ready

volumes:
  postgres_data:
